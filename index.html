<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EULER fx-Natural PRO</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh; display: flex; justify-content: center; align-items: center;
            font-family: 'Roboto Mono', monospace; padding: 20px;
        }
        .calculator {
            background: linear-gradient(145deg, #2d3748 0%, #1a202c 100%);
            border-radius: 20px; padding: 25px 20px 30px 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            max-width: 380px; width: 100%; border: 3px solid #1a202c;
        }
        .brand-header { text-align: center; margin-bottom: 15px; }
        .brand-header h1 {
            font-size: 1.6rem; letter-spacing: 4px; font-weight: 700;
            background: linear-gradient(180deg, #fff 0%, #a0aec0 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .brand-header span { font-size: 0.7rem; color: #4a5568; letter-spacing: 2px; display: block; margin-top: 3px; }
        .solar-panel {
            background: linear-gradient(180deg, #1a202c 0%, #2d3748 100%);
            height: 25px; border-radius: 4px; margin: 0 10px 15px 10px;
            display: flex; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); border: 1px solid #0d1117;
        }
        .solar-cell { flex: 1; border-right: 1px solid #0d1117; background: linear-gradient(180deg, #3d4858 0%, #1a202c 100%); }
        .display-container {
            background: #9eb3a8; border-radius: 8px; padding: 15px; margin-bottom: 20px;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3); position: relative; min-height: 100px;
        }
        .display-container::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.02) 3px, rgba(0,0,0,0.02) 6px);
            pointer-events: none;
        }
        .display {
            font-family: 'Roboto Mono', monospace; color: #1a202c; font-size: 1.8rem; text-align: right;
            min-height: 60px; display: flex; align-items: center; justify-content: flex-end;
            position: relative; z-index: 1; word-break: break-all;
        }
        .indicator { position: absolute; top: 8px; left: 10px; font-size: 0.8rem; color: #2d3748; font-weight: bold; }
        .buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        button {
            border: none; outline: none; cursor: pointer; font-family: 'Roboto Mono', monospace; font-weight: 700;
            font-size: 0.95rem; border-radius: 50%; width: 100%; aspect-ratio: 1; display: flex;
            align-items: center; justify-content: center; box-shadow: 0 4px 0 rgba(0,0,0,0.4), 0 5px 10px rgba(0,0,0,0.3);
            transition: all 0.1s; color: white;
        }
        button:active { transform: translateY(4px); box-shadow: 0 0 0 rgba(0,0,0,0.4), inset 0 2px 5px rgba(0,0,0,0.5); }
        .btn-shift { background: linear-gradient(145deg, #9f7aea 0%, #6b46c1 100%); font-size: 0.8rem; }
        .btn-alpha { background: linear-gradient(145deg, #fc8181 0%, #c53030 100%); font-size: 0.8rem; }
        .btn-mode { background: linear-gradient(145deg, #4a5568 0%, #2d3748 100%); color: #a0aec0; font-size: 0.7rem; }
        .btn-func { background: linear-gradient(145deg, #718096 0%, #4a5568 100%); color: #e2e8f0; font-size: 0.85rem; }
        .btn-num { background: linear-gradient(145deg, #4a5568 0%, #2d3748 100%); font-size: 1.2rem; }
        .btn-op { background: linear-gradient(145deg, #4299e1 0%, #2b6cb0 100%); font-size: 1.3rem; }
        .btn-del { background: linear-gradient(145deg, #fc8181 0%, #c53030 100%); font-size: 0.9rem; }
        .btn-ac { background: linear-gradient(145deg, #f6ad55 0%, #c05621 100%); font-size: 0.9rem; }
        .btn-eq { background: linear-gradient(145deg, #3182ce 0%, #1a365d 100%); font-size: 1.4rem; }
        @media (max-width: 480px) { button { font-size: 0.85rem; } .btn-num { font-size: 1.1rem; } }
    </style>
</head>
<body>
<div class="calculator">
    <div class="solar-panel"><div class="solar-cell"></div><div class="solar-cell"></div><div class="solar-cell"></div><div class="solar-cell"></div></div>
    <div class="brand-header"><h1>EULER</h1><span>NATURAL DISPLAY</span></div>
    <div class="display-container">
        <div class="indicator" id="indicator">D</div>
        <div class="display" id="display">0</div>
    </div>
    <div class="buttons">
        <button class="btn-shift" onclick="shift()">SHIFT</button>
        <button class="btn-alpha" onclick="alpha()">ALPHA</button>
        <button class="btn-mode" onclick="toggleMode()">MODE</button>
        <button class="btn-mode" style="font-size:0.7rem" onclick="clearAll()">ON</button>
        <button class="btn-func" onclick="insert('^')">^</button>

        <button class="btn-func" onclick="insert('sqrt(')">√</button>
        <button class="btn-func" onclick="insert('²')">x²</button>
        <button class="btn-func" onclick="insert('³')">x³</button>
        <button class="btn-func" onclick="insert('log(')">log</button>
        <button class="btn-func" onclick="insert('ln(')">ln</button>

        <button class="btn-func" onclick="insert('sin(')">sin</button>
        <button class="btn-func" onclick="insert('cos(')">cos</button>
        <button class="btn-func" onclick="insert('tan(')">tan</button>
        <button class="btn-op" onclick="insert('(')">(</button>
        <button class="btn-op" onclick="insert(')')">)</button>

        <button class="btn-num" onclick="insert('7')">7</button>
        <button class="btn-num" onclick="insert('8')">8</button>
        <button class="btn-num" onclick="insert('9')">9</button>
        <button class="btn-del" onclick="del()">DEL</button>
        <button class="btn-ac" onclick="clearAll()">AC</button>

        <button class="btn-num" onclick="insert('4')">4</button>
        <button class="btn-num" onclick="insert('5')">5</button>
        <button class="btn-num" onclick="insert('6')">6</button>
        <button class="btn-op" onclick="insert('*')">×</button>
        <button class="btn-op" onclick="insert('/')">÷</button>

        <button class="btn-num" onclick="insert('1')">1</button>
        <button class="btn-num" onclick="insert('2')">2</button>
        <button class="btn-num" onclick="insert('3')">3</button>
        <button class="btn-op" onclick="insert('+')">+</button>
        <button class="btn-op" onclick="insert('-')">−</button>

        <button class="btn-num" onclick="insert('0')">0</button>
        <button class="btn-num" onclick="insert('.')">.</button>
        <button class="btn-func" onclick="insert('E')">EXP</button>
        <button class="btn-func" onclick="insert('Ans')">Ans</button>
        <button class="btn-eq" onclick="calc()">=</button>
    </div>
</div>

<script>
    let expr = '';
    let isDeg = true;
    let ans = 0;
    const display = document.getElementById('display');
    const indicator = document.getElementById('indicator');

    function update() { 
        display.textContent = expr || '0'; 
        indicator.textContent = isDeg ? 'D' : 'R';
    }

    function insert(val) { 
        // Si es función y viene después de número/Ans/), añadir *
        if (/^(log|ln|sin|cos|tan|sqrt)\($/.test(val)) {
            const last = expr.slice(-1);
            if (last && (/\d/.test(last) || last === ')' || last === 's')) expr += '*';
        }
        if (val === 'E') val = '*10^';
        if (val === '²') val = '**2';
        if (val === '³') val = '**3';
        if (val === '×') val = '*';
        if (val === '÷') val = '/';
        if (val === '−') val = '-';
        
        expr += val; 
        update(); 
    }

    function del() { expr = expr.slice(0, -1); update(); }
    function clearAll() { expr = ''; update(); }
    function toggleMode() { isDeg = !isDeg; update(); }
    function shift() {}
    function alpha() {}

    function calc() {
        if (!expr) return;
        try {
            // Preparar expresión
            let e = expr;
            
            // Reemplazar constantes
            e = e.replace(/π/g, 'Math.PI');
            e = e.replace(/\be\b/g, 'Math.E');
            e = e.replace(/Ans/g, ans);
            
            // Multiplicación implícita
            e = e.replace(/(\d)\(/g, '$1*(');
            e = e.replace(/\)(\d)/g, ')*$1');
            
            // --- FIX: Convertir ^ a ** para exponenciación ---
            e = e.replace(/\^/g, '**');
            
            // Crear función con definiciones locales EXACTAS como en tu ejemplo
            // log = Math.log10, ln = Math.log
            const code = `
                var log = Math.log10;
                var ln = Math.log;
                var sqrt = Math.sqrt;
                var sin = ${isDeg ? 'function(x){return Math.sin(x*Math.PI/180);}' : 'Math.sin'};
                var cos = ${isDeg ? 'function(x){return Math.cos(x*Math.PI/180);}' : 'Math.cos'};
                var tan = ${isDeg ? 'function(x){return Math.tan(x*Math.PI/180);}' : 'Math.tan'};
                return (${e});
            `;
            
            let res = Function(code)();

            if (!isFinite(res)) throw 'Error';

            ans = parseFloat(res.toPrecision(10));
            expr = ans.toString();

        } catch (err) {
            expr = 'Syntax ERROR';
            setTimeout(() => { expr = ''; update(); }, 1500);
        }
        update();
    }

    // Teclado
    document.addEventListener('keydown', (e) => {
        if (e.key >= '0' && e.key <= '9') insert(e.key);
        if (e.key === '.') insert('.');
        if (e.key === '+') insert('+');
        if (e.key === '-') insert('-');
        if (e.key === '*') insert('*');
        if (e.key === '/') insert('/');
        if (e.key === '(') insert('(');
        if (e.key === ')') insert(')');
        if (e.key === '^') insert('^');
        if (e.key === 'Enter' || e.key === '=') calc();
        if (e.key === 'Backspace') del();
        if (e.key === 'Escape') clearAll();
    });

    update();
</script>
</body>
</html>
